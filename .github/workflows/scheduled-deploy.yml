name: Scheduled Deployment Verification

on:
  push:
    tags:
      - "v*"   # Only runs when you push a version tag like v1.0.0

jobs:
  verify-deployment:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: onyiglobal2025
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image (version tag)
        run: |
          echo "Pulling image with tag: ${{ github.ref_name }}"
          docker pull ghcr.io/onyiglobal2025/github-devops-foundation-lab:${{ github.ref_name }}

      - name: Run container
        run: |
          docker run -d \
            --name test-container \
            -p 3000:3000 \
            ghcr.io/onyiglobal2025/github-devops-foundation-lab:${{ github.ref_name }}

          sleep 15
          docker ps

      - name: Health check
        run: |
          curl --fail http://localhost:3000/healthz

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true