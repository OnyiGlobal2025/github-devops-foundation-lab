name: Scheduled Deployment Verification

on:
  push:
    tags:
      - "v*"  # Trigger on version tags like v1.0.0
  workflow_dispatch:       # Allows manual trigger

jobs:
  verify-deployment:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repo name to lowercase
        id: repo
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Pull latest Docker image
        run: |
          docker pull ghcr.io/onyiglobal2025/github-devops-foundation-lab:${{ github.ref_name }}

      - name: Run container
        run: |
          docker run -d --name test-container -p 3000:3000 ghcr.io/onyiglobal2025/github-devops-foundation-lab:${{ github.ref_name }}
          sleep 15
          docker ps -a
          docker logs test-container || true

      - name: Health check
        run: |
          curl --fail http://localhost:3000/healthz

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true