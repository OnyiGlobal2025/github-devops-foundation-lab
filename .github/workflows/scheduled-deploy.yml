name: Deployment Verification

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # ⚠️ Must match your build workflow name EXACTLY
    types:
      - completed

jobs:
  verify-deployment:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Set image tag from workflow
        run: echo "IMAGE_TAG=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: onyiglobal2025
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          echo "Pulling image with tag: $IMAGE_TAG"
          docker pull ghcr.io/onyiglobal2025/github-devops-foundation-lab:$IMAGE_TAG

      - name: Run container
        run: |
          docker run -d \
            --name test-container \
            -p 3000:3000 \
            ghcr.io/onyiglobal2025/github-devops-foundation-lab:$IMAGE_TAG

          sleep 15
          docker ps

      - name: Health check
        run: |
          curl --fail http://localhost:3000/healthz

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true